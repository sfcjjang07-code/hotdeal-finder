<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 핫딜 판독기</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center p-4">
    <header class="w-full max-w-md text-center my-6">
        <h1 class="text-3xl font-extrabold text-amber-400">⚡ 핫딜 판독기</h1>
        <p class="text-gray-400 text-sm mt-1">바코드를 찍어 역대 최저가와 비교하세요</p>
    </header>
    <main class="w-full max-w-md bg-gray-800 rounded-2xl shadow-xl p-4 space-y-6">
        <div class="overflow-hidden rounded-xl bg-black border border-gray-700">
            <div id="reader" class="w-full"></div>
        </div>
        <div id="result-section" class="hidden p-4 rounded-xl border border-gray-700 bg-gray-800 space-y-4">
            <div id="product-info"></div>
            <div id="compare-box" class="hidden space-y-2">
                <label class="block text-sm font-semibold text-gray-300">현재 판매 가격 입력:</label>
                <div class="flex gap-2">
                    <input type="number" id="current-price" placeholder="원" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 text-white focus:outline-none">
                    <button onclick="comparePrice()" class="bg-amber-500 text-gray-950 font-bold px-4 py-2 rounded-lg">판독</button>
                </div>
                <div id="verdict" class="text-center font-extrabold text-xl mt-4"></div>
            </div>
            <div id="register-box" class="hidden space-y-3">
                <p class="text-rose-400 text-sm">처음 보는 바코드입니다! 상품을 등록해 주세요.</p>
                <input type="text" id="new-name" placeholder="상품명" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 text-sm">
                <input type="number" id="new-hotdeal" placeholder="목표 핫딜가 (원)" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 text-sm">
                <input type="number" id="new-normal" placeholder="평소 가격 (원)" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2 text-sm">
                <button onclick="registerProduct()" class="w-full bg-emerald-500 text-white font-bold py-2 rounded-lg">내 장부에 저장하기</button>
            </div>
        </div>
        <div class="mt-4 p-3 bg-black rounded-xl border border-gray-800">
            <p class="text-xs font-bold text-gray-500 mb-1">📟 시스템 상태 모니터</p>
            <div id="debug-log" class="text-xs font-mono text-green-400 h-24 overflow-y-auto space-y-1">
                [시스템이 준비되었습니다.]
            </div>
        </div>
    </main>
    <script>
        let activeBarcode = ""; let targetHotdealPrice = 0;
        
        // 화면에 로그를 찍어주는 도우미 함수
        function printLog(msg) {
            const logDiv = document.getElementById('debug-log');
            logDiv.innerHTML += `<div>> ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight; // 스크롤 맨 아래로
        }
        
        function onScanSuccess(decodedText) {
            // 연속 스캔 방지 처리 대폭 강화
            if (activeBarcode === decodedText) return; 
            activeBarcode = decodedText;
            
            printLog(`📸 바코드 감지 성공! 번호: ${decodedText}`);
            printLog(`📡 서버로 데이터 조회 요청 중...`);
            
            fetch(`/api/scan/${decodedText}`)
                .then(res => {
                    printLog(`ℹ️ 서버 응답 도착 (상태코드: ${res.status})`);
                    if (!res.ok) throw new Error(`서버 에러 (${res.status})`);
                    return res.json();
                })
                .then(data => {
                    printLog(`✅ 수신 데이터 분석 완료: ${JSON.stringify(data)}`);
                    
                    const resSection = document.getElementById('result-section');
                    const infoDiv = document.getElementById('product-info');
                    const compareBox = document.getElementById('compare-box');
                    const registerBox = document.getElementById('register-box');
                    
                    resSection.classList.remove('hidden');
                    document.getElementById('verdict').innerText = "";
                    
                    if (data.exists) {
                        printLog(`📂 등록된 상품 발견! [${data.name}]`);
                        targetHotdealPrice = data.hotdeal_price;
                        infoDiv.innerHTML = `<h2 class="text-xl font-bold text-emerald-400">${data.name}</h2><p class="text-sm text-gray-400">바코드: ${activeBarcode}</p><div class="mt-2 text-sm"><div>🔥 기준 핫딜가: <span class="text-amber-400 font-bold">${data.hotdeal_price}원</span></div></div>`;
                        compareBox.classList.remove('hidden'); registerBox.classList.add('hidden');
                    } else {
                        printLog(`⚠️ 미등록 상품입니다. 등록 창을 엽니다.`);
                        infoDiv.innerHTML = `<h2 class="text-xl font-bold text-gray-300">미등록 상품</h2><p class="text-sm text-gray-400">바코드: ${activeBarcode}</p>`;
                        compareBox.classList.add('hidden'); 
                        registerBox.classList.remove('hidden'); // 등록창 강제 노출
                    }
                })
                .catch(err => {
                    printLog(`❌ 통신 실패 오류: ${err.message}`);
                });
        }
        
        function comparePrice() {
            const current = parseInt(document.getElementById('current-price').value);
            const verdict = document.getElementById('verdict');
            if (current <= targetHotdealPrice) { verdict.className = "text-center font-extrabold text-2xl mt-4 text-emerald-400"; verdict.innerText = "🚨 역대급 핫딜! 당장 사세요! 🚨"; }
            else { verdict.className = "text-center font-extrabold text-xl mt-4 text-rose-400"; verdict.innerText = "핫딜이 아닙니다."; }
        }
        
        function registerProduct() {
            const name = document.getElementById('new-name').value;
            const hotdeal_price = document.getElementById('new-hotdeal').value;
            const normal_price = document.getElementById('new-normal').value;
            printLog(`💾 신규 상품 등록 요청 중... [${name}]`);
            fetch(`/api/scan/${activeBarcode}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, hotdeal_price, normal_price })
            }).then(res => res.json()).then(data => { if(data.success) { printLog(`🎉 등록 완료!`); alert(data.message); location.reload(); } });
        }
        
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 150 } });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
